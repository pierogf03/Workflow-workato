name: SQL Tuning Review with Workato Genie

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sql-tuning-review:
    runs-on: ubuntu-latest

    env:
      PROJECT_CODE: "SOMOS BELCORP"
      DATABASE_NAME: "BelcorpPeru"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Prepare report folders
        run: |
          mkdir -p reports/requests
          mkdir -p reports/responses

          echo "Project code: $PROJECT_CODE"
          echo "Database name: $DATABASE_NAME"
          echo "Pull request number: ${{ github.event.pull_request.number }}"

      - name: Detect changed SQL files
        id: detect_sql
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.sql$' \
            > reports/sql_files.txt || true

          echo "SQL files detected:"
          cat reports/sql_files.txt || true

          if [ ! -s reports/sql_files.txt ]; then
            echo "has_sql=false" >> "$GITHUB_OUTPUT"
            echo "false" > reports/should_fail.txt

            jq -n \
              --arg project_code "$PROJECT_CODE" \
              --arg database_name "$DATABASE_NAME" \
              '{
                pipeline_continue: true,
                verdict: "PASA",
                project_code: $project_code,
                database_name: $database_name,
                files_analyzed: 0,
                results: []
              }' > reports/aggregate_pipeline_result.json

            exit 0
          fi

          echo "has_sql=true" >> "$GITHUB_OUTPUT"

      - name: Call Workato Genie for each SQL file
        if: steps.detect_sql.outputs.has_sql == 'true'
        env:
          WORKATO_TUNING_URL: ${{ secrets.WORKATO_TUNING_URL }}
          WORKATO_API_TOKEN: ${{ secrets.WORKATO_API_TOKEN }}
        run: |
          if [ -z "$WORKATO_TUNING_URL" ]; then
            echo "Missing secret WORKATO_TUNING_URL"
            exit 1
          fi

          if [ -z "$WORKATO_API_TOKEN" ]; then
            echo "Missing secret WORKATO_API_TOKEN"
            exit 1
          fi

          COUNTER=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            COUNTER=$((COUNTER + 1))

            echo "Analyzing SQL file: $file"

            SAFE_NAME=$(echo "$file" | sed 's#[^a-zA-Z0-9._-]#_#g')
            REQUEST_FILE="reports/requests/request_${COUNTER}_${SAFE_NAME}.json"
            RESPONSE_FILE="reports/responses/response_${COUNTER}_${SAFE_NAME}.json"

            jq -n \
              --arg project_code "$PROJECT_CODE" \
              --arg database_name "$DATABASE_NAME" \
              --rawfile sql_query "$file" \
              --arg file_path "$file" \
              --arg repository "${{ github.repository }}" \
              --arg branch "${{ github.head_ref }}" \
              --arg commit_sha "${{ github.event.pull_request.head.sha }}" \
              --arg pull_request_number "${{ github.event.pull_request.number }}" \
              '{
                project_code: $project_code,
                database_name: $database_name,
                sql_query: $sql_query,
                file_path: $file_path,
                repository: $repository,
                branch: $branch,
                commit_sha: $commit_sha,
                pull_request_number: $pull_request_number,
                source: "github_actions"
              }' > "$REQUEST_FILE"

            HTTP_CODE=$(curl -sS \
              -o "$RESPONSE_FILE" \
              -w "%{http_code}" \
              -X POST "$WORKATO_TUNING_URL" \
              -H "API-TOKEN: $WORKATO_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data @"$REQUEST_FILE")

            echo "HTTP status for $file: $HTTP_CODE"

            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "Workato API failed for $file"

              RAW_RESPONSE=$(cat "$RESPONSE_FILE" || true)

              jq -n \
                --arg file_path "$file" \
                --arg http_code "$HTTP_CODE" \
                --arg raw_response "$RAW_RESPONSE" \
                '{
                  status: "error",
                  file_path: $file_path,
                  http_code: $http_code,
                  report_markdown: "## Error al llamar Workato\n\nNo se pudo obtener respuesta válida desde el endpoint de Workato.",
                  pipeline_result: {
                    pipeline_continue: false,
                    verdict: "NO PASA",
                    total_score: 0,
                    minimum_required_score: 80,
                    critical_blockers: ["Workato endpoint call failed"],
                    summary: "The Workato API call failed.",
                    criteria: []
                  },
                  raw_response: $raw_response
                }' > "$RESPONSE_FILE.tmp"

              mv "$RESPONSE_FILE.tmp" "$RESPONSE_FILE"
            fi

          done < reports/sql_files.txt

      - name: Build PR report from Workato responses
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const responsesDir = 'reports/responses';
          const files = fs.existsSync(responsesDir)
            ? fs.readdirSync(responsesDir).filter(f => f.endsWith('.json')).sort()
            : [];

          function safeJsonParse(value) {
            if (typeof value !== 'string') return value;

            const text = value.trim();

            if (!text) return value;

            try {
              return JSON.parse(text);
            } catch {
              return value;
            }
          }

          function decodeJsonStringLiteral(literalContent) {
            try {
              return JSON.parse(`"${literalContent}"`);
            } catch {
              return literalContent
                .replace(/\\r\\n/g, '\n')
                .replace(/\\n/g, '\n')
                .replace(/\\t/g, '  ')
                .replace(/\\"/g, '"')
                .replace(/\\\\/g, '\\');
            }
          }

          function extractStringFieldFromRaw(rawText, fieldName) {
            if (typeof rawText !== 'string') return '';

            const regex = new RegExp(`"${fieldName}"\\s*:\\s*"((?:\\\\.|[^"\\\\])*)"`, 's');
            const match = rawText.match(regex);

            if (!match) return '';

            return decodeJsonStringLiteral(match[1]);
          }

          function extractJsonObjectAfterKey(rawText, keyName) {
            if (typeof rawText !== 'string') return null;

            const keyIndex = rawText.indexOf(`"${keyName}"`);

            if (keyIndex === -1) return null;

            const colonIndex = rawText.indexOf(':', keyIndex);

            if (colonIndex === -1) return null;

            const startIndex = rawText.indexOf('{', colonIndex);

            if (startIndex === -1) return null;

            let depth = 0;
            let inString = false;
            let escaped = false;

            for (let i = startIndex; i < rawText.length; i++) {
              const ch = rawText[i];

              if (escaped) {
                escaped = false;
                continue;
              }

              if (ch === '\\') {
                escaped = true;
                continue;
              }

              if (ch === '"') {
                inString = !inString;
                continue;
              }

              if (inString) continue;

              if (ch === '{') depth++;
              if (ch === '}') depth--;

              if (depth === 0) {
                const candidate = rawText.slice(startIndex, i + 1);
                try {
                  return JSON.parse(candidate);
                } catch {
                  return null;
                }
              }
            }

            return null;
          }

          function recursivelyFindStructuredObject(value, depth = 0) {
            if (depth > 8 || value === null || value === undefined) return null;

            const parsed = safeJsonParse(value);

            if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
              if (
                parsed.report_markdown ||
                parsed.pipeline_result ||
                parsed.status ||
                parsed.summary
              ) {
                return parsed;
              }

              for (const key of Object.keys(parsed)) {
                const found = recursivelyFindStructuredObject(parsed[key], depth + 1);

                if (found) return found;
              }
            }

            if (typeof parsed === 'string') {
              const reportMarkdown = extractStringFieldFromRaw(parsed, 'report_markdown');
              const pipelineResult = extractJsonObjectAfterKey(parsed, 'pipeline_result');

              if (reportMarkdown || pipelineResult) {
                return {
                  report_markdown: reportMarkdown,
                  pipeline_result: pipelineResult || undefined,
                  raw_text: parsed
                };
              }
            }

            return null;
          }

          function readResponse(filePath) {
            const raw = fs.readFileSync(filePath, 'utf8');
            const parsed = safeJsonParse(raw);
            const structured = recursivelyFindStructuredObject(parsed);

            if (structured) {
              structured.__raw_response_text = raw;
              return structured;
            }

            const reportMarkdown = extractStringFieldFromRaw(raw, 'report_markdown');
            const pipelineResult = extractJsonObjectAfterKey(raw, 'pipeline_result');

            if (reportMarkdown || pipelineResult) {
              return {
                report_markdown: reportMarkdown,
                pipeline_result: pipelineResult || undefined,
                __raw_response_text: raw
              };
            }

            return {
              status: 'error',
              report_markdown: '## Respuesta no estructurada\n\nNo se pudo extraer `report_markdown` desde la respuesta de Workato.',
              pipeline_result: {
                pipeline_continue: false,
                verdict: 'NO PASA',
                total_score: 0,
                minimum_required_score: 80,
                critical_blockers: ['Could not extract report_markdown from Workato response'],
                summary: 'The response could not be parsed as the expected structure.',
                criteria: []
              },
              __raw_response_text: raw
            };
          }

          function normalizeBoolean(value) {
            if (value === true) return true;
            if (value === false) return false;

            if (typeof value === 'string') {
              return value.toLowerCase().trim() === 'true';
            }

            return false;
          }

          function decodeEscapedMarkdown(text) {
            if (typeof text !== 'string') return '';

            let result = text;

            if (!result.includes('\n') && result.includes('\\n')) {
              result = result
                .replace(/\\r\\n/g, '\n')
                .replace(/\\n/g, '\n')
                .replace(/\\t/g, '  ');
            }

            return result;
          }

          function normalizeMarkdown(markdown) {
            let text = decodeEscapedMarkdown(markdown || '');

            text = text
              .replace(/Pipeline JSON:\s*```json\s*[\s\S]*?```/gi, '')
              .replace(/"pipeline_result"\s*:\s*\{[\s\S]*$/i, '')
              .replace(/,\s*"raw_notes"\s*:\s*"[\s\S]*$/i, '')
              .trim();

            text = text.replace(
              /(^|\n)sql\n([\s\S]*?)(?=\n---|\n## |\n### |\n\d+\.\s|\n$)/gi,
              function (_, prefix, code) {
                return `${prefix}\`\`\`sql\n${code.trim()}\n\`\`\`\n\n`;
              }
            );

            text = text.replace(
              /(^|\n)(select\s+[\s\S]*?)(?=\n---|\n## |\n### |\n\d+\.\s|\n$)/gi,
              function (_, prefix, code) {
                if (code.trim().startsWith('```')) return `${prefix}${code}`;
                return `${prefix}\`\`\`sql\n${code.trim()}\n\`\`\`\n\n`;
              }
            );

            return text.trim();
          }

          function extractReportMarkdown(response) {
            if (response && typeof response === 'object') {
              if (typeof response.report_markdown === 'string') {
                return normalizeMarkdown(response.report_markdown);
              }

              if (typeof response.raw_genie_response === 'string') {
                const parsed = safeJsonParse(response.raw_genie_response);

                if (parsed && typeof parsed === 'object' && parsed.report_markdown) {
                  return normalizeMarkdown(parsed.report_markdown);
                }

                const extracted = extractStringFieldFromRaw(response.raw_genie_response, 'report_markdown');

                if (extracted) {
                  return normalizeMarkdown(extracted);
                }
              }

              if (typeof response.__raw_response_text === 'string') {
                const extracted = extractStringFieldFromRaw(response.__raw_response_text, 'report_markdown');

                if (extracted) {
                  return normalizeMarkdown(extracted);
                }
              }
            }

            return '## Análisis no disponible\n\nNo se pudo extraer el campo `report_markdown` desde la respuesta de Workato.';
          }

          function extractPipelineResult(response) {
            if (response && typeof response === 'object') {
              if (response.pipeline_result && typeof response.pipeline_result === 'object') {
                return response.pipeline_result;
              }

              if (typeof response.raw_genie_response === 'string') {
                const parsed = safeJsonParse(response.raw_genie_response);

                if (parsed && typeof parsed === 'object' && parsed.pipeline_result) {
                  return parsed.pipeline_result;
                }

                const extracted = extractJsonObjectAfterKey(response.raw_genie_response, 'pipeline_result');

                if (extracted) return extracted;
              }

              if (typeof response.__raw_response_text === 'string') {
                const extracted = extractJsonObjectAfterKey(response.__raw_response_text, 'pipeline_result');

                if (extracted) return extracted;
              }
            }

            return {
              pipeline_continue: false,
              verdict: 'NO PASA',
              total_score: 0,
              minimum_required_score: 80,
              critical_blockers: ['Pipeline JSON was not found in the API response'],
              summary: 'No parseable Pipeline JSON was found.',
              criteria: []
            };
          }

          function compactSummary(text, maxLength = 450) {
            if (!text) return '';

            const clean = String(text).replace(/\s+/g, ' ').trim();

            if (clean.length <= maxLength) return clean;

            return clean.slice(0, maxLength - 3) + '...';
          }

          const marker = '<!-- workato-tuning-advisor-report -->';

          if (files.length === 0) {
            const comment = `${marker}
          # SQL Tuning Advisor

          **Proyecto:** ${process.env.PROJECT_CODE || 'SOMOS BELCORP'}  
          **Base de datos:** ${process.env.DATABASE_NAME || 'BelcorpPeru'}  

          No se detectaron archivos \`.sql\` modificados o no se generaron respuestas desde Workato.

          **Resultado:** PASA
          `;

            fs.writeFileSync('reports/pr_comment.md', comment);
            fs.writeFileSync('reports/should_fail.txt', 'false');
            fs.writeFileSync('reports/aggregate_pipeline_result.json', JSON.stringify({
              pipeline_continue: true,
              verdict: 'PASA',
              project_code: process.env.PROJECT_CODE || 'SOMOS BELCORP',
              database_name: process.env.DATABASE_NAME || 'BelcorpPeru',
              files_analyzed: 0,
              results: []
            }, null, 2));

            console.log(comment);
            process.exit(0);
          }

          const results = [];

          for (const file of files) {
            const fullPath = path.join(responsesDir, file);
            const response = readResponse(fullPath);

            const pipeline = extractPipelineResult(response);
            const reportMarkdown = extractReportMarkdown(response);

            const filePath =
              response.file_path ||
              response.result?.file_path ||
              response.output?.file_path ||
              file.replace(/^response_\d+_/, '');

            results.push({
              file_path: filePath,
              status: response.status || 'unknown',
              report_markdown: reportMarkdown,
              pipeline_result: pipeline,
              raw_response: response
            });
          }

          const failed = results.some(r => normalizeBoolean(r.pipeline_result?.pipeline_continue) !== true);

          let comment = `${marker}\n`;
          comment += `# SQL Tuning Advisor\n\n`;
          comment += `**Proyecto:** ${process.env.PROJECT_CODE || 'SOMOS BELCORP'}  \n`;
          comment += `**Base de datos:** ${process.env.DATABASE_NAME || 'BelcorpPeru'}  \n`;
          comment += `**Archivos analizados:** ${results.length}\n\n`;

          comment += `## Resumen ejecutivo\n\n`;
          comment += `| Archivo | Decisión | Puntaje | Continúa | Blockers |\n`;
          comment += `|---|---|---:|---|---:|\n`;

          for (const r of results) {
            const p = r.pipeline_result || {};
            const verdict = p.verdict || 'NO PASA';
            const score = Number.isFinite(Number(p.total_score)) ? Number(p.total_score) : 0;
            const minScore = Number.isFinite(Number(p.minimum_required_score)) ? Number(p.minimum_required_score) : 80;
            const cont = normalizeBoolean(p.pipeline_continue) ? 'SÍ' : 'NO';
            const blockers = Array.isArray(p.critical_blockers) ? p.critical_blockers.length : 0;

            comment += `| \`${r.file_path}\` | **${verdict}** | ${score}/${minScore} | ${cont} | ${blockers} |\n`;
          }

          comment += `\n`;

          for (const r of results) {
            const p = r.pipeline_result || {};
            const score = Number.isFinite(Number(p.total_score)) ? Number(p.total_score) : 0;
            const minScore = Number.isFinite(Number(p.minimum_required_score)) ? Number(p.minimum_required_score) : 80;
            const cleanReport = r.report_markdown || '';

            comment += `---\n\n`;
            comment += `## Archivo: \`${r.file_path}\`\n\n`;
            comment += `**Decisión:** ${p.verdict || 'NO PASA'}  \n`;
            comment += `**Puntaje:** ${score}/${minScore}  \n`;
            comment += `**Continúa pipeline:** ${normalizeBoolean(p.pipeline_continue) ? 'SÍ' : 'NO'}  \n\n`;

            if (p.summary) {
              comment += `> ${compactSummary(p.summary)}\n\n`;
            }

            if (Array.isArray(p.critical_blockers) && p.critical_blockers.length > 0) {
              comment += `### Critical blockers\n\n`;

              for (const blocker of p.critical_blockers) {
                comment += `- ${blocker}\n`;
              }

              comment += `\n`;
            }

            if (Array.isArray(p.criteria) && p.criteria.length > 0) {
              comment += `### Evaluación de criterios\n\n`;
              comment += `| Criterio | Puntaje | Estado | Evidencia |\n`;
              comment += `|---|---:|---|---|\n`;

              for (const c of p.criteria) {
                const evidence = String(c.evidence || '').replace(/\n/g, ' ');
                comment += `| ${c.name || ''} | ${c.score ?? 0}/${c.max_score ?? ''} | ${c.status || ''} | ${evidence} |\n`;
              }

              comment += `\n`;
            }

            if (cleanReport) {
              comment += `<details>\n`;
              comment += `<summary><strong>Ver análisis completo</strong></summary>\n\n`;
              comment += `${cleanReport}\n\n`;
              comment += `</details>\n\n`;
            }

            comment += `<details>\n`;
            comment += `<summary><strong>Ver Pipeline JSON</strong></summary>\n\n`;
            comment += `\`\`\`json\n`;
            comment += `${JSON.stringify(p, null, 2)}\n`;
            comment += `\`\`\`\n\n`;
            comment += `</details>\n\n`;
          }

          fs.writeFileSync('reports/pr_comment_full.md', comment);

          const maxLength = 60000;

          if (comment.length > maxLength) {
            comment = comment.slice(0, maxLength);
            comment += `\n\n---\n\n_Comentario truncado por tamaño. Revisa el artifact \`sql-tuning-advisor-report\` para ver el reporte completo._\n`;
          }

          fs.writeFileSync('reports/pr_comment.md', comment);

          fs.writeFileSync('reports/aggregate_pipeline_result.json', JSON.stringify({
            pipeline_continue: !failed,
            verdict: failed ? 'NO PASA' : 'PASA',
            project_code: process.env.PROJECT_CODE || 'SOMOS BELCORP',
            database_name: process.env.DATABASE_NAME || 'BelcorpPeru',
            files_analyzed: results.length,
            results
          }, null, 2));

          fs.writeFileSync('reports/should_fail.txt', failed ? 'true' : 'false');

          console.log(comment);
          NODE

      - name: Add report to job summary
        if: always()
        run: |
          if [ -f reports/pr_comment.md ]; then
            cat reports/pr_comment.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No reports/pr_comment.md found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create or update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- workato-tuning-advisor-report -->';

            if (!context.payload.pull_request) {
              core.setFailed('This workflow was not triggered by a pull_request event.');
              return;
            }

            if (!fs.existsSync('reports/pr_comment.md')) {
              core.setFailed('reports/pr_comment.md was not found.');
              return;
            }

            const body = fs.readFileSync('reports/pr_comment.md', 'utf8');

            core.info(`Comment length: ${body.length}`);

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            core.info(`Repository: ${owner}/${repo}`);
            core.info(`Pull request: ${issue_number}`);

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.data.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              core.info(`Updating existing comment: ${existing.id}`);
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info('PR comment updated successfully.');
            } else {
              core.info('Creating new PR comment.');
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
              core.info(`PR comment created successfully: ${created.data.html_url}`);
            }

      - name: Upload full tuning report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sql-tuning-advisor-report
          path: reports/

      - name: Fail workflow if quality gate does not pass
        if: always()
        run: |
          if [ -f reports/should_fail.txt ] && [ "$(cat reports/should_fail.txt)" = "true" ]; then
            echo "SQL tuning quality gate failed."
            exit 1
          fi

          echo "SQL tuning quality gate passed."
